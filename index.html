<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jota Hosting - Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header h1 span {
            color: #1fec7d;
        }

        .header p {
            color: #8b8d99;
            font-size: 1.1rem;
        }

        /* Container de Planos */
        .plans-container {
            max-width: 400px;
            margin: 0 auto 40px auto;
            background-color: #16171e;
            border: 1px solid #23252f;
            border-radius: 12px;
            padding: 25px;
        }

        .plan-title {
            color: #8b8d99;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .plan-price {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .plan-price span {
            font-size: 1rem;
            color: #8b8d99;
        }

        .plan-features {
            list-style: none;
            margin-bottom: 25px;
        }

        .plan-features li {
            margin-bottom: 12px;
            color: #b3b5c6;
            display: flex;
            align-items: center;
        }

        .plan-features li::before {
            content: "✓";
            color: #1fec7d;
            margin-right: 10px;
            font-weight: bold;
        }

        .btn-order {
            display: block;
            width: 100%;
            background-color: #16171e;
            color: #ffffff;
            border: 1px solid #23252f;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn-order:hover {
            background-color: #23252f;
        }

        /* Modal / Formulário de Finalização */
        .modal {
            max-width: 400px;
            margin: 0 auto;
            background-color: #16171e;
            border: 1px solid #23252f;
            border-radius: 12px;
            padding: 25px;
        }

        .modal h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .modal p {
            color: #8b8d99;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .modal p span {
            color: #1fec7d;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #8b8d99;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background-color: #0b0c10;
            border: 1px solid #23252f;
            color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #1fec7d;
        }

        .btn-submit {
            width: 100%;
            background-color: #1fec7d;
            color: #0b0c10;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #17b35e;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Seu servidor <br><span>no ar em minutos.</span></h1>
        <p>Planos simples, preços justos e suporte de verdade.</p>
    </div>

    <div class="plans-container">
        <div class="plan-title">100 Slots</div>
        <div class="plan-price">R$ 7 <span>/ mês</span></div>
        <ul class="plan-features">
            <li>Painel SAH</li>
            <li>Linux .so</li>
            <li>FTP incluso</li>
            <li>MySQL incluso</li>
            <li>Anti-DDoS</li>
        </ul>
        <a href="#finalizar" class="btn-order">Contratar agora</a>
    </div>

    <div id="finalizar" class="modal">
        <h2>Finalizar pedido</h2>
        <p>Plano selecionado: <span>100 Slots — R$7/mês</span></p>

        <form id="orderForm">
            <div class="form-group">
                <label>Seu Nome / Nick</label>
                <input type="text" id="name" placeholder="Ex: MrRodrigo ou Rodrigo Silva" required>
            </div>

            <div class="form-group">
                <label>Usuário / ID do Discord</label>
                <input type="text" id="discord" placeholder="Ex: rodrigo_sa" required>
            </div>

            <div class="form-group">
                <label>Forma de Pagamento</label>
                <select id="payment" required>
                    <option value="">Selecione...</option>
                    <option value="Pix">Pix</option>
                </select>
            </div>

            <div class="form-group">
                <label>Observação (Opcional)</label>
                <textarea id="obs" rows="3" placeholder="Ex: Preciso de suporte para instalar plugin X..."></textarea>
            </div>

            <button type="button" class="btn-submit" onclick="sendToWhatsApp()">
                📱 Enviar pelo WhatsApp
            </button>
        </form>
    </div>

    <script>
        function sendToWhatsApp() {
            // Substitua pelo seu número de WhatsApp real (com DDD e código do país)
            // Exemplo: 5511999999999
            const phoneNumber = "5589981092254"; 

            const name = document.getElementById('name').value;
            const discord = document.getElementById('discord').value;
            const payment = document.getElementById('payment').value;
            const obs = document.getElementById('obs').value;

            if(!name || !discord || !payment) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            // Monta o texto que vai chegar no seu WhatsApp
            const message = `*Novo Pedido - Jota Hosting*%0A%0A` +
                            `*Plano:* 100 Slots - R$7/mês%0A` +
                            `*Nome/Nick:* ${name}%0A` +
                            `*Discord:* ${discord}%0A` +
                            `*Pagamento:* ${payment}%0A` +
                            `*Observação:* ${obs}`;

            // Abre o WhatsApp com os dados preenchidos
            window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
        }
    </script>

</body>
</html>
